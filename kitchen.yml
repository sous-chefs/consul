---
driver:
  name: vagrant
  customize:
    memory: 1024

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  chef_license: accept
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-9
  - name: debian-12
  - name: ubuntu-24.04

# Reusable YAML anchors for run_lists
x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  client: &client_run_list
    - recipe[test::client]

# Reusable YAML anchors for attributes
x-attributes:
  default: &default_attrs
    consul_test:
      version: latest
      install_method: repository
      config_path: /etc/consul/consul.json

# Reusable YAML anchors for verifiers
x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  client: &client_verifier
    inspec_tests:
      - path: test/integration/client

suites:
  - name: default
    run_list: *default_run_list
    attributes: *default_attrs
    verifier: *default_verifier

  - name: client
    run_list: *client_run_list
    provisioner:
      named_run_list: client
    attributes: *default_attrs
    verifier: *client_verifier
